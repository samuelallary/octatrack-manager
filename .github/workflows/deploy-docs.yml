name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'user-guide/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: user-guide/package-lock.json

      - name: Install dependencies
        working-directory: user-guide
        run: npm ci

      - name: Optimize images
        working-directory: user-guide
        run: npm run optimize-images

      - name: Build user guide
        working-directory: user-guide
        run: npm run build

      - name: Generate PDF user guide
        working-directory: user-guide
        run: |
          npx docusaurus serve --port 3030 --no-open &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -s http://localhost:3030/octatrack-manager/docs/intro > /dev/null 2>&1 && break
            sleep 1
          done
          npx docs-to-pdf docusaurus \
            --initialDocURLs "http://localhost:3030/octatrack-manager/docs/intro" \
            --contentSelector "article" \
            --paginationSelector "a.pagination-nav__link--next" \
            --excludeSelectors ".margin-vert--xl a,[class^='tocCollapsible'],.breadcrumbs,.theme-edit-this-page" \
            --coverImage "http://localhost:3030/octatrack-manager/img/logo-512.png" \
            --coverTitle "Octatrack Manager" \
            --coverSub "User Guide" \
            --paperFormat "A4" \
            --pdfMargin "60,50,60,50" \
            --outputPDFFilename "build/octatrack-manager-user-guide.pdf" \
            --puppeteerArgs "--no-sandbox" \
            --disableTOC
          kill $SERVER_PID 2>/dev/null || true

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: user-guide/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
